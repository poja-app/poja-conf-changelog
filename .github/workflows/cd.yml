name: cd.yml
on:
  push:
    branches: [main]

jobs:
  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Convert Markdown to HTML
        run: |
          mkdir -p site
          for file in *.md; do
            filename=$(basename "$file" .md)
            if echo "$filename" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              pandoc "$file" -f markdown -t html -s -o "site/$filename.html" --metadata title="Poja $filename"
            else
              pandoc "$file" -f markdown -t html -s -o "site/$filename.html"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4